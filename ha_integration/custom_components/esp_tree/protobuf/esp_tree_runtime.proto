syntax = "proto3";

package esp.tree.runtime.v2;

message Envelope {
  string request_id = 1;
  uint32 api_version = 2;
  oneof msg {
    AuthChallenge auth_challenge = 10;
    AuthResponse auth_response = 11;
    AuthOk auth_ok = 12;
    AuthFailed auth_failed = 13;
    ClientHello client_hello = 14;
    FullSnapshot full_snapshot = 15;
    EventBatch event_batch = 16;
    CommandRequest command_request = 17;
    CommandResult command_result = 18;
    ConfigCommandRequest config_command_request = 19;
    ConfigCommandResult config_command_result = 20;
    Ping ping = 21;
    Pong pong = 22;
    OtaStartRequest ota_start_request = 30;
    OtaChunkBatch ota_chunk_batch = 31;
    OtaAbortRequest ota_abort_request = 32;
    OtaAccepted ota_accepted = 33;
    OtaChunkRequest ota_chunk_request = 34;
    OtaStatus ota_status = 35;
    OtaAborted ota_aborted = 36;
    Error error = 99;
  }
}

enum OtaState {
  OTA_STATE_UNSPECIFIED = 0;
  OTA_STATE_IDLE = 1;
  OTA_STATE_ANNOUNCING = 2;
  OTA_STATE_TRANSFERRING = 3;
  OTA_STATE_VERIFYING = 4;
  OTA_STATE_SUCCESS = 5;
  OTA_STATE_FAILED = 6;
  OTA_STATE_ABORTED = 7;
}

message OtaStartRequest {
  string target_mac = 1;
  uint32 file_size = 2;
  string md5 = 3;
  string sha256 = 4;
  string filename = 5;
  uint32 preferred_chunk_size = 6;
}

message OtaAccepted {
  string job_id = 1;
  string target_mac = 2;
  uint32 max_chunk_size = 3;
  uint32 total_chunks = 4;
  uint32 max_chunks_per_batch = 5;
}

message OtaChunkRequest {
  string job_id = 1;
  string request_id = 2;
  repeated uint32 sequences = 3;
  OtaProgress progress = 4;
}

message OtaProgress {
  uint32 chunks_sent = 1;
  uint32 chunks_confirmed = 2;
  uint32 current_increment = 3;
  uint32 total_increments = 4;
  uint32 retransmit_round = 5;
  uint32 buffer_size_kb = 6;
  uint32 percent = 7;
}

message OtaChunkBatch {
  string job_id = 1;
  string response_request_id = 2;
  repeated OtaChunk chunks = 3;
}

message OtaChunk {
  uint32 sequence = 1;
  uint32 offset = 2;
  bytes payload = 3;
  uint32 flags = 4;
  uint32 crc32 = 5;
}

message OtaStatus {
  string job_id = 1;
  OtaState state = 2;
  uint32 percent = 3;
  uint32 bytes_received = 4;
  uint32 file_size = 5;
  string error_detail = 6;
}

message OtaAbortRequest {
  string job_id = 1;
  string reason = 2;
}

message OtaAborted {
  string job_id = 1;
  string reason = 2;
}

message AuthChallenge {
  bytes server_nonce = 1;
  uint32 min_version = 2;
  uint32 max_version = 3;
  string protocol = 4;
  string bridge_mac = 5;
}

message AuthResponse {
  string client_kind = 1;
  string client_name = 2;
  bytes client_nonce = 3;
  bytes hmac_sha256 = 4;
}

message AuthOk {
  uint32 negotiated_version = 1;
  string server_name = 2;
  BridgeIdentity bridge = 3;
  BridgeCapabilities capabilities = 4;
}

message AuthFailed {
  string code = 1;
  string message = 2;
}

message ClientHello {
  bool request_full_snapshot = 1;
  string integration_version = 2;
  repeated KnownRemoteSchema known_remote_schemas = 3;
}

message KnownRemoteSchema {
  string remote_mac = 1;
  string schema_hash = 2;
}

message FullSnapshot {
  BridgeIdentity bridge = 1;
  BridgeRuntime bridge_runtime = 2;
  repeated RemoteSnapshot remotes = 3;
  uint64 snapshot_unix_ms = 4;
}

message BridgeIdentity {
  string bridge_mac = 1;
  string bridge_name = 2;
  string friendly_name = 3;
  string network_id = 4;
  string manufacturer = 5;
  string model = 6;
  string project_name = 7;
  string project_version = 8;
  string firmware_build_date = 9;
  string api_server = 10;
  string chip_name = 11;
}

message BridgeCapabilities {
  bool supports_runtime_v2 = 1;
  bool supports_commands = 2;
  bool supports_schema_push = 3;
  bool supports_state_push = 4;
  bool supports_topology = 5;
  bool supports_config_commands = 6;
}

message BridgeRuntime {
  bool online = 1;
  sint32 wifi_rssi = 2;
  uint32 uptime_s = 3;
  uint32 remote_count = 4;
}

message RemoteSnapshot {
  RemoteIdentity identity = 1;
  RemoteRuntime runtime = 2;
  RemoteDescriptorSet descriptor_set = 3;
  repeated EntityState states = 4;
}

message RemoteIdentity {
  string remote_mac = 1;
  string esphome_name = 2;
  string friendly_name = 3;
  string manufacturer = 4;
  string model = 5;
  string project_name = 6;
  string project_version = 7;
  string firmware_build_date = 8;
  string firmware_md5 = 9;
  string schema_hash = 10;
  uint32 entity_count = 11;
  string chip_name = 12;
  bool can_relay = 13;
  bool relay_enabled = 14;
}

message RemoteRuntime {
  bool online = 1;
  string bridge_mac = 2;
  string parent_mac = 3;
  uint32 hops_to_bridge = 4;
  sint32 rssi = 5;
  int32 last_seen_bridge_uptime_s = 7;
  string session_id = 8;
  uint32 last_tx_counter = 9;
  uint32 uptime_s = 10;
}

message RemoteDescriptorSet {
  string schema_hash = 1;
  repeated EntityDescriptor entities = 2;
}

message EntityDescriptor {
  string object_id = 1;
  string platform = 2;
  string friendly_name = 3;
  string icon = 4;
  string device_class = 5;
  string state_class = 6;
  string unit_of_measurement = 7;
  string entity_category = 8;
  bool disabled_by_default = 9;
  bool diagnostic = 10;
  bool writable = 11;
  string native_type = 12;
  string options_json = 13;
  repeated Option options = 14;
  CommandDescriptor command = 15;
}

message Option {
  string key = 1;
  string label = 2;
}

message CommandDescriptor {
  repeated string supported_commands = 1;
  repeated ArgumentDescriptor arguments = 2;
}

message ArgumentDescriptor {
  string name = 1;
  string value_type = 2;
  bool required = 3;
  double min_value = 4;
  double max_value = 5;
  double step = 6;
}

message EntityState {
  string object_id = 1;
  bool available = 2;
  uint64 observed_unix_ms = 3;
  oneof value {
    bool bool_value = 10;
    sint64 int_value = 11;
    double float_value = 12;
    string string_value = 13;
    bytes bytes_value = 14;
  }
}

message EventBatch {
  repeated Event events = 1;
}

message Event {
  oneof kind {
    BridgeHeartbeat bridge_heartbeat = 10;
    RemoteAvailabilityEvent remote_availability = 11;
    RemoteStateEvent remote_state = 12;
    RemoteSchemaChangedEvent remote_schema_changed = 13;
    RemoteMetadataChangedEvent remote_metadata_changed = 14;
    TopologyChangedEvent topology_changed = 15;
  }
}

message RemoteAvailabilityEvent {
  string remote_mac = 1;
  bool online = 2;
  string bridge_mac = 3;
  string session_id = 4;
  uint32 tx_counter = 5;
  uint64 observed_unix_ms = 6;
  sint32 rssi = 7;
  uint32 hops_to_bridge = 8;
  string reason = 9;
  uint32 uptime_s = 10;
}

message RemoteStateEvent {
  string remote_mac = 1;
  string bridge_mac = 2;
  string session_id = 3;
  uint32 tx_counter = 4;
  repeated EntityState states = 5;
  uint64 observed_unix_ms = 6;
}

message RemoteSchemaChangedEvent {
  string remote_mac = 1;
  string bridge_mac = 2;
  string session_id = 3;
  string old_schema_hash = 4;
  RemoteSnapshot snapshot = 5;
}

message RemoteMetadataChangedEvent {
  RemoteIdentity identity = 1;
  RemoteRuntime runtime = 2;
}

message TopologyChangedEvent {
  string remote_mac = 1;
  string bridge_mac = 2;
  string parent_mac = 3;
  uint32 hops_to_bridge = 4;
  sint32 rssi = 5;
  uint64 observed_unix_ms = 6;
  uint32 uptime_s = 7;
}

message BridgeHeartbeat {
  string bridge_mac = 1;
  uint64 bridge_unix_ms = 2;
  uint32 uptime_s = 3;
}

message CommandRequest {
  string remote_mac = 1;
  string object_id = 2;
  string command = 3;
  repeated CommandArgument args = 4;
}

message CommandArgument {
  string name = 1;
  oneof value {
    bool bool_value = 10;
    sint64 int_value = 11;
    double float_value = 12;
    string string_value = 13;
  }
}

message CommandResult {
  string remote_mac = 1;
  string object_id = 2;
  string command = 3;
  string bridge_mac = 4;
  string session_id = 5;
  CommandStatus status = 6;
  string error_code = 7;
  string error_message = 8;
}

enum CommandStatus {
  COMMAND_STATUS_UNSPECIFIED = 0;
  COMMAND_STATUS_ACCEPTED = 1;
  COMMAND_STATUS_DELIVERED = 2;
  COMMAND_STATUS_FAILED = 3;
  COMMAND_STATUS_UNAVAILABLE = 4;
  COMMAND_STATUS_UNSUPPORTED = 5;
  COMMAND_STATUS_TIMEOUT = 6;
}

message ConfigCommandRequest {
  string remote_mac = 1;
  string command = 2;
  uint32 interval_seconds = 3;
  string parent_mac = 4;
  bool clear_parent = 5;
  bool relay_enable = 6;
}

message ConfigCommandResult {
  string remote_mac = 1;
  string command = 2;
  string bridge_mac = 3;
  string session_id = 4;
  CommandStatus status = 5;
  string error_code = 6;
  string error_message = 7;
}

message Ping {
  uint64 monotonic_ms = 1;
}

message Pong {
  uint64 monotonic_ms = 1;
}

message Error {
  string code = 1;
  string message = 2;
}
