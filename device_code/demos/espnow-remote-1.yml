# Notes:
# - This remote has no WiFi connection to your network — it only uses ESP-NOW LR
# - Entity field names ("chip_temperature", "led") are sent in SCHEMA_PUSH
# - The bridge will publish these as Home Assistant entities via MQTT discovery
# - Multiple remotes can use same network_id and psk
# - Each gets its own HA device based on unique ESP-NOW LR MAC address
