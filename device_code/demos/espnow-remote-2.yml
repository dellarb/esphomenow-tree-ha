esphome:
  name: espnow-remote-2
  friendly_name: ESP-NOW Remote 2
  project:
    name: esptree.otablast
    version: "V01"
  on_boot:
    priority: -100 # Run after WiFi/ESP-NOW is initialized
    then:
      - component.update: chip_temp

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging for remote-side application logs
# Without this, remote only prints ROM/bootloader messages
logger:
  level: DEBUG

web_server:
  port: 80

mdns:
  disabled: true

api:

########################### TESTING WIFI FOR OTA FLASHING NO API FLAG SO SHOULDNT CONNECT TO HA
ota:
  - platform: esphome
    password: !secret ota_password

# WiFi required for ESP-NOW LR (WiFi radio is also ESP-NOW radio)
# WiFi channel determines ESP-NOW LR channel
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


# No MQTT — all comms via ESP-NOW LR to the bridge.

external_components:
  - source:
      type: local
      path: ../components
    components: [esp_tree_remote, esp_tree_common]

# ESP-NOW LR Remote Component Configuration
esp_tree_remote:
  # Network identifier (must match bridge, 1-32 chars, case-sensitive)
  network_id: !secret espnow_network_id
  # Pre-shared key (64 hex chars = 32 bytes, must match bridge)
  psk: !secret espnow_psk
  # ESP-NOW radio mode: lr or regular
  espnow_mode: regular
  ota_over_espnow: true
  # Allow this remote to act as a relay for other nodes
  relay_enabled: true
# Heartbeat interval in seconds (send heartbeat if no state changes)
  heartbeat_interval_seconds: 10
  preferred_parents:
    - "E8:3D:C1:9D:6C:D0"

#deep_sleep:
#  id: deep_sleep_control
#  run_duration: 10s # Stays awake long enough to connect and send
#  sleep_duration: 30s
#  wakeup_pin_mode: KEEP_AWAKE # Ensures the chip doesn't get stuck in a boot loop

sensor:
  - platform: internal_temperature
    name: "Chip Temperature"
    id: chip_temp
    entity_category: diagnostic
    update_interval: 10s

# 2. SWITCH
switch:
  - platform: gpio
    pin: GPIO2
    name: "Board LED Switch PIRATETIME"
    id: board_led
    icon: mdi:led-on
  - platform: restart
    name: "Reboot"
