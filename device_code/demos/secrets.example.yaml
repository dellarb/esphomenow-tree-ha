# ESP-NOW LR Demo Secrets
# Place your actual secrets here - this file is gitignored
# Copy this to secrets.yml in your ESPHome config directory for production use

# WiFi credentials
wifi_ssid: "REPLACE_WITH_YOUR_WIFI_SSID"
wifi_password: "REPLACE_WITH_YOUR_WIFI_PASSWORD"

# MQTT broker credentials
mqtt_broker: "REPLACE_WITH_YOUR_MQTT_BROKER_IP"
mqtt_username: "REPLACE_WITH_YOUR_MQTT_USERNAME"
mqtt_password: "REPLACE_WITH_YOUR_MQTT_PASSWORD"

# OTA update credentials
ota_password: "REPLACE_WITH_YOUR_OTA_PASSWORD"
api_encryption_key: "REPLACE_WITH_YOUR_ENCRYPTION_KEY"

# ESP-NOW LR network configuration
# Generate a strong PSK: openssl rand -hex 32
espnow_network_id: "myhouse"
espnow_psk: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"

# Remote node configuration
remote_node_label: "ESP-NOW LR Remote"

# Notes:
# - This file is gitignored to prevent committing secrets
# - For production, use a separate secrets file outside the repo
# - Generate a real PSK: openssl rand -hex 32
# - Keep PSK consistent across all bridge and remote nodes