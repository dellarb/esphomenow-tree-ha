# 11. TEXT / TEXT_SENSOR

interval:
  - interval: 100ms
    then:
      - lambda: |-
          static int last_millis = 0;
          static int last_uptime_millis = 0;
          int now = millis();
          int elapsed = now - last_millis;
          if (last_millis == 0) elapsed = 100;

          #define UPDATE_SENSOR(n) \
            if (now >= id(next_update_##n)) { \
              id(random_value_##n) = static_cast<float>(esp_random() % 101); \
              id(random_sensor_##n).publish_state(id(random_value_##n)); \
              id(next_update_##n) = now + (2000 + esp_random() % 2001); \
            }

          UPDATE_SENSOR(1)
          UPDATE_SENSOR(2)
          UPDATE_SENSOR(3)
          UPDATE_SENSOR(4)
          UPDATE_SENSOR(5)
          UPDATE_SENSOR(6)
          UPDATE_SENSOR(7)
          UPDATE_SENSOR(8)
          UPDATE_SENSOR(9)
          UPDATE_SENSOR(10)
          UPDATE_SENSOR(11)
          UPDATE_SENSOR(12)
          UPDATE_SENSOR(13)
          UPDATE_SENSOR(14)
          UPDATE_SENSOR(15)
          UPDATE_SENSOR(16)
          UPDATE_SENSOR(17)
          UPDATE_SENSOR(18)
          UPDATE_SENSOR(19)
          UPDATE_SENSOR(20)

          if (now - last_uptime_millis >= 20000) {
            float secs = id(uptime_sensor).state;
            if (!std::isnan(secs)) {
              std::string output;
              output.reserve(256);
              output = "Uptime: " + std::to_string((int)secs) + "s.";
              std::string padding = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
              while (output.length() < 255) {
                output += padding;
              }
              if (output.length() > 255) {
                output = output.substr(0, 255);
              }
              id(long_uptime_text).publish_state(output);
            }
            last_uptime_millis = now;
          }

          last_millis = now;

