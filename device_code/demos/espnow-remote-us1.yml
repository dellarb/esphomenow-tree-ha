# ESP-NOW LR Remote Leaf Demo
# Leaf-only remote with the full demo entity set, forced to join through relay1.

esphome:
  name: espnow-remote-us1
  friendly_name: ESP-NOW Ultrasonic 1
  project:
    name: esptree.otablast
    version: "V01"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

web_server:
  port: 80

mdns:
  disabled: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: ../components
    components: [esp_tree_remote, esp_tree_common]

esp_tree_remote:
  network_id: !secret espnow_network_id
  psk: !secret espnow_psk
  espnow_mode: regular
  ota_over_espnow: true
  heartbeat_interval_seconds: 10
  preferred_parents:
    - "F4:2D:C9:58:33:10"

switch:
  - platform: gpio
    pin: GPIO8
    name: "Board LED Switch"
    id: board_led
    icon: mdi:led-on
    inverted: true
  - platform: restart
    name: "Reboot"

uart:
  id: u_bus
  tx_pin: GPIO4
  rx_pin: GPIO3
  baud_rate: 9600
  stop_bits: 1

sensor:
  - platform: template
    name: "Shed Distance"
    id: shed_distance
    unit_of_measurement: "cm"
    update_interval: 5s
    lambda: |-
      // 1. Check if the system has been up for at least 5 seconds
      if (millis() < 5000) {
        ESP_LOGD("jsn", "Waiting for sensor to warm up...");
        return {};
      }

      // 2. Clear the UART buffer (IDF Style)
      uint8_t dummy;
      while (id(u_bus).available() > 0) {
        id(u_bus).read_byte(&dummy);
      }

      // 3. Trigger the reading
      id(u_bus).write_byte(0x55);
      
      // 4. Give the sensor time to process the ping and send 4 bytes back
      // 150ms is usually safe, but some waterproof ones need 200ms
      delay(200); 

      uint8_t data[4];
      if (id(u_bus).read_array(data, 4)) {
        if (data[0] == 0xFF) {
          uint8_t checksum = (data[0] + data[1] + data[2]) & 0xFF;
          if (data[3] == checksum) {
            int mm = (data[1] << 8) + data[2];
            float cm = mm / 10.0f;
            if (cm > 15.0 && cm < 650.0) {
              return cm;
            }
          }
        }
      }
      ESP_LOGW("jsn", "No valid reading from sensor");
      return {};
