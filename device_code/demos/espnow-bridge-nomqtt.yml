# ESP-NOW LR Bridge Prototype (protobuf-only upstream)
# This variant intentionally omits the mqtt: block to verify the bridge
# compiles and runs with only the WebSocket protobuf API enabled.

esphome:
  name: espnow-bridge-c5-nomqtt
  friendly_name: ESP-NOW C5 Bridge No MQTT

esp32:
  board: esp32-c5-devkitc-1
  variant: esp32c5
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_USE_TRACE_FACILITY: "y"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "12288"

logger:
  hardware_uart: USB_CDC
  baud_rate: 115200
  level: DEBUG

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 10.1.1.146

external_components:
  - source:
      type: local
      path: ../components
    components: [esp_tree_bridge, esp_tree_common]

web_server:
  port: 80

esp_tree_bridge:
  id: bridge_component
  network_id: !secret espnow_network_id
  psk: !secret espnow_psk
  espnow_mode: regular
  ota_over_espnow: true
  heartbeat_interval_seconds: 60
  # Accepted but ignored without mqtt:
  mqtt_discovery_prefix: homeassistant
  api_key: !secret bridge_api_key
