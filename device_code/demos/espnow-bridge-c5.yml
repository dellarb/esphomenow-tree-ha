# ESP-NOW LR Bridge Prototype
# Complete bridge implementation for Home Assistant integration
# Connects to WiFi/MQTT and relays ESP-NOW LR packets from remotes
#
# Usage:
# 1. Copy demos/secrets.example.yml to demos/secrets.yaml (must be .yaml, not .yml)
# 2. Edit demos/secrets.yaml with your actual credentials
# 3. Compile: esphome compile demos/espnow-bridge.yml
# 4. Flash: esphome upload demos/espnow-bridge.yml
#
# Note: demos/secrets.yaml is gitignored for security (ESPHome requires .yaml extension)

esphome:
  name: espnow-bridge-c5
  friendly_name: ESP-NOW C5 Bridge MQTT

esp32:
  board: esp32-c5-devkitc-1
  variant: esp32c5
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_USE_TRACE_FACILITY: "y"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "12288"

# Enable logging for development/debugging
logger:
  hardware_uart: USB_CDC
  baud_rate: 115200
  level: DEBUG

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 10.1.1.146

# Import ESP-NOW LR bridge component from local development directory
external_components:
  - source:
      type: local
      path: ../components
    components: [esp_tree_bridge, esp_tree_common]
    # esp_tree_common is auto-loaded by esp_tree_bridge but listed here for clarity
  
# MQTT broker for Home Assistant integration.
# MQTT is now optional — remove this block for protobuf-only operation
# via the WebSocket protobuf API. When absent, the bridge uses the
# protobuf WebSocket as its sole upstream transport.
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password

# Enable the web server for the bridge's topology page
web_server:
  port: 80

# ESP-NOW LR Bridge Component Configuration
esp_tree_bridge:
  id: bridge_component
  # Network identifier (must match remotes, 1-32 chars, case-sensitive)
  network_id: !secret espnow_network_id
  # Pre-shared key (64 hex chars = 32 bytes)
  psk: !secret espnow_psk
  # ESP-NOW radio mode: lr or regular
  espnow_mode: regular
  ota_over_espnow: true
  # Heartbeat interval in seconds (remotes send heartbeat if silent this long)
  heartbeat_interval_seconds: 60
  # MQTT discovery prefix is only used when mqtt: block is present
  mqtt_discovery_prefix: homeassistant
  api_key: !secret bridge_api_key

# Bridge diagnostics are now published from the component itself via MQTT discovery/state.
