# ESP-01S Single Relay Breakout with ESP-NOW Remote
#
# Minimal ESP8266-based remote: ESP-01S on a single-relay breakout board.
# GPIO0 = relay, GPIO2 = status LED (or external button if wired).
# No UART power meter, no CSE7766 — just a relay, a button, and WiFi signal.
#
# ESP8266 limitations vs ESP32:
#   - espnow_mode: regular only (no LR / 802.11LR)
#   - Max ESP-NOW payload: 250 bytes (no V2/LR extended packets)
#   - No RSSI in ESP-NOW receive callbacks (always 0)
#
# Requires: demos/secrets.yaml with espnow_network_id and espnow_psk

substitutions:
  name: "espnow-remote-esp01"
  friendly_name: "ESP01 Relay"
  relay_restore_mode: ALWAYS_OFF
  log_level: "DEBUG"

esphome:
  name: "espnow-remote-esp01"
  friendly_name: "ESP01 Relay"
  project:
    name: esptree.otablast
    version: "V01"
  min_version: 2024.6.0
  platformio_options:
    board_upload.flash_size: 1MB
    board_upload.maximum_size: 1048576
    board_build.ldscript: eagle.flash.1m.ld

esp8266:
  board: esp01_1m
  restore_from_flash: true

preferences:
  flash_write_interval: 5min

external_components:
  - source:
      type: local
      path: ../components
    components: [espnow_82xx_remote, esp_tree_common]

espnow_82xx_remote:
  id: espnow_remote
  network_id: !secret espnow_network_id
  psk: !secret espnow_psk
  heartbeat_interval_seconds: 30
  ota_over_espnow: true
  preferred_parents: []

api:

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: ${log_level}
  baud_rate: 115200

web_server:
  port: 80

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap: {}
  fast_connect: "false"

mdns:
  disabled: true

captive_portal:

switch:
  - platform: gpio
    name: "Relay Switch"
    pin:
      number: GPIO0
      mode: OUTPUT
    id: relay
    restore_mode: ${relay_restore_mode}
    icon: mdi:power-socket

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
    id: button_input
    on_press:
      - switch.toggle: relay

  - platform: status
    name: "Status"
    entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

button:
  - platform: restart
    name: "Restart"
    entity_category: config